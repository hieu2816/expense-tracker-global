server:
  port: 8080

spring:
  application:
    name: expense-tracking-global

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:MySuperStrongSuperLongSecretKeyForSecurity2806}
  expiration: 86400000 # 24 hours in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health,info      # NOT metrics — metrics expose too many internals publicly
  endpoint:
    health:
      show-details: when_authorized   # Default: only authenticated users see DB/internal details
      probes:
        enabled: true     # Enables /health/liveness and /health/readiness (K8s probes)
  health:
    db:
      enabled: true       # Checks PostgreSQL connection pool
    diskSpace:
      enabled: true      # Checks disk space

app:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8080

# Plaid configuration
plaid:
  client-id: ${PLAID_CLIENT_ID:your-client-id}
  secret: ${PLAID_SECRET:your-secret}
  environment: ${PLAID_ENV:sandbox}
  webhook-url: ${PLAID_WEBHOOK_URL:}

encryption:
  secret-key: ${ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}


# Transaction Sync Configuration
sync:
  enabled: true
  interval-minutes: 15
  active-user-days: 30
