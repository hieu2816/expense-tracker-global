services:
  # --- PostgreSQL Database ---
  database:
    image: postgres:16-alpine
    container_name: expense-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - expense_data-global:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # --- Spring Boot Backend ---
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/kunlu/backend:latest} # Sẽ do Github truyền vào
    container_name: expense-backend
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: ${PLAID_ENV}
      PLAID_WEBHOOK_URL: ${PLAID_WEBHOOK_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Limited memory settings for Java to prevent OOM in constrained environments
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx450m -XX:+UseContainerSupport -XX:MaxRAMPercentage=50.0 -XX:+ExitOnOutOfMemoryError"
    depends_on:
      database:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s


  # --- Nginx (Frontend + Reverse Proxy) ---
  nginx:
    image: ${FRONTEND_IMAGE:-ghcr.io/kunlu/frontend:latest}
    container_name: expense-nginx
    environment:
      TLS_DOMAIN: ${TLS_DOMAIN:-spendwiser.me}
    ports:
      - "80:80"
      - "443:443" # HTTPS port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - certbot-etc:/etc/letsencrypt:ro # NEW — SSL certs (read-only)
      - certbot-www:/var/www/certbot:ro # NEW — challenge files (read-only)
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://127.0.0.1/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Certbot (SSL Certificate Manager) ---
  certbot:
    image: certbot/certbot
    container_name: expense-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt # writes certs here
      - certbot-www:/var/www/certbot # writes challenge files here

  # --- Prometheus (Monitoring) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: expense-prometheus
    environment:
      GRAFANA_PROM_URL: ${GRAFANA_PROM_URL}
      GRAFANA_PROM_USER: ${GRAFANA_PROM_USER}
      GRAFANA_PROM_PASS: ${GRAFANA_PROM_PASS}
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - expense_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d' # Keep data local 7 days for lightweight monitoring
      # IMPORTANT: Allowed read ${VARIABLE} from config file to inject GHCR credentials for scraping private metrics endpoints
      - '--enable-feature=envvar-expansion'
    restart: unless-stopped
    depends_on:
      - backend
    # Limit Ram usage to protect EC2
    deploy:
      resources:
        limits:
          memory: 150m

    # --- Node Exporter: Monitoring CPU, RAM, Hard Drive ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: expense-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.rootfs=/rootfs'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 30m

  # --- cAdvisor: Monitoring each container ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: expense-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 80m

volumes:
  expense_data-global:
  certbot-etc:
  certbot-www:
  expense_prometheus_data:
